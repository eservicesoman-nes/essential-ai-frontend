<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>NES AI — Intelligence Platform</title>
  <meta name="description" content="NES AI — intelligent workspace with 1M context, web search, DALL-E 3, and daily free tier.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    
    /* NES AI Branding — Dark Blue Background + Blue Font */
    :root{--bg:#0a0e2a;--surface:#0f1436;--border:#1a2154;--text:#e8e8ec;--muted:#6b7b9e;--accent:#3b82f6;--accent-lo:rgba(59,130,246,0.12);--accent-md:rgba(59,130,246,0.25);--green:#2ecc71;--red:#e74c3c;--blue:#3b82f6;--ui:'Syne',sans-serif;--mono:'DM Mono',monospace;}
    
    /* Light mode — ONLY chat area changes, sidebar stays DARK */
    [data-theme="light"]{--bg:#f3f4f6;--surface:#ffffff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--accent:#2563eb;--accent-lo:rgba(37,99,235,0.1);--accent-md:rgba(37,99,235,0.2);}
    
    /* Sidebar ALWAYS dark — override even in light mode */
    .sidebar {
      background: #0f1436 !important;
      border-right: 1px solid #1a2154 !important;
      transition: transform 0.3s ease;
    }
    [data-theme="light"] .sidebar .logo,
    [data-theme="light"] .sidebar .logo-version,
    [data-theme="light"] .sidebar .nav-item,
    [data-theme="light"] .sidebar .usage-row,
    [data-theme="light"] .sidebar .user-email,
    [data-theme="light"] .sidebar .user-av {
      color: #e8e8ec !important;
    }
    [data-theme="light"] .sidebar .nav-item:hover,
    [data-theme="light"] .sidebar .nav-item.active {
      background: rgba(59,130,246,0.12) !important;
      color: #3b82f6 !important;
    }
    [data-theme="light"] .sidebar .usage-wrap {
      border-top-color: #1a2154 !important;
    }
    [data-theme="light"] .sidebar .usage-track {
      background: #1a2154 !important;
    }
    
    /* Sidebar collapse button */
    .sidebar-toggle {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 1000;
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      font-size: 1.2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    
    body{font-family:var(--ui);background:var(--bg);color:var(--text);height:100dvh;display:flex;overflow:hidden;}

    /* Auth Screen */
    #authScreen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;align-items:center;justify-content:center;}
    .auth-box{width:min(400px,90vw);background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px;margin:20px;}
    .auth-logo{font-size:1.6rem;font-weight:800;margin-bottom:4px;text-align:center;}.auth-logo span{color:var(--accent);}
    .auth-sub{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-bottom:32px;text-align:center;}
    .auth-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;}
    .auth-tab{background:none;border:none;color:var(--muted);font-family:var(--ui);font-weight:600;padding:10px 20px;cursor:pointer;}
    .auth-tab.active{color:var(--accent);border-bottom:2px solid var(--accent);}
    .auth-panel{display:none;flex-direction:column;gap:12px;}.auth-panel.active{display:flex;}
    .auth-input{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-family:var(--mono);font-size:.85rem;outline:none;width:100%;}
    .auth-input:focus{border-color:var(--accent);}
    .auth-btn{background:var(--accent);border:none;border-radius:12px;padding:12px;color:white;font-weight:700;cursor:pointer;font-family:var(--ui);}
    .auth-btn:hover{opacity:.88;}
    .auth-err{font-family:var(--mono);font-size:.7rem;color:var(--red);min-height:18px;}

    /* App layout */
    #app{display:none;width:100%;height:100dvh;overflow:hidden;}
    #app.visible{display:flex;}

    /* Sidebar */
    .sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;padding:24px 16px;height:100dvh;overflow-y:auto;position:relative;z-index:10;}
    .sidebar-logo{text-align:center;margin-bottom:16px;}
    .sidebar-logo img{width:80px;height:80px;object-fit:contain;}
    /* Desktop upgrade button in sidebar — hidden */
    .upgrade-sidebar-btn{display:none;}
    .nav{display:flex;flex-direction:column;gap:6px;flex:1;}
    .nav-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:12px;cursor:pointer;color:#6b7b9e;font-size:.9rem;font-weight:600;transition:all .15s;}
    .nav-item:hover{background:rgba(59,130,246,0.12);color:#3b82f6;}
    .nav-item.active{background:rgba(59,130,246,0.12);color:#3b82f6;}
    .nav-icon{font-size:1.2rem;width:28px;flex-shrink:0;color:#3b82f6;}
    .usage-wrap{margin-top:auto;padding:16px 8px 0;border-top:1px solid #1a2154;}
    .usage-row{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.65rem;color:#6b7b9e;margin-bottom:8px;}
    .usage-track{height:4px;background:#1a2154;border-radius:99px;overflow:hidden;margin-bottom:16px;}
    .usage-fill{height:100%;background:#3b82f6;border-radius:99px;width:0%;transition:width .4s;}
    .user-row{display:flex;align-items:center;gap:10px;padding-top:12px;}
    .user-av{width:32px;height:32px;background:rgba(59,130,246,0.12);border:1px solid rgba(59,130,246,0.25);border-radius:50%;display:grid;place-items:center;font-size:.75rem;color:#3b82f6;font-weight:700;flex-shrink:0;}
    .user-email{font-family:var(--mono);font-size:.7rem;color:#6b7b9e;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .logout-btn{background:none;border:none;color:#6b7b9e;cursor:pointer;font-size:.9rem;}
    .logout-btn:hover{color:#e74c3c;}

    /* Main Chat Area — INCREASED FONT SIZE */
    .main{flex:1;display:flex;flex-direction:column;height:100dvh;overflow:hidden;min-width:0;position:relative;background:var(--bg);}

    /* Theme toggle */
    .theme-toggle{position:absolute;top:16px;right:20px;background:var(--surface);border:1px solid var(--border);border-radius:50%;width:38px;height:38px;display:grid;place-items:center;cursor:pointer;color:var(--muted);font-size:1.1rem;z-index:10;transition:all .2s;}
    .theme-toggle:hover{color:var(--accent);border-color:var(--accent);}

    /* Welcome card */
    .welcome-card{padding:20px 28px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--bg);}
    .chat-mode-label{font-family:var(--mono);font-size:.85rem;color:var(--accent);letter-spacing:1px;margin-bottom:10px;font-weight:800;}
    .free-tier-row{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:6px;}
    .free-tier{font-family:var(--mono);font-size:.75rem;color:var(--muted);}
    .upgrade-tier-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:30px;padding:8px 18px;color:white;font-family:var(--ui);font-size:.8rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;}
    .upgrade-tier-btn:hover{transform:scale(1.02);box-shadow:0 2px 8px rgba(59,130,246,.3);}

    /* Messages — INCREASED FONT SIZE */
    .messages{flex:1;overflow-y:auto;padding:20px 28px;display:flex;flex-direction:column;gap:18px;min-height:0;background:var(--bg);}
    .messages::-webkit-scrollbar{width:4px;}
    .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
    .msg{display:flex;gap:14px;animation:fadeIn .2s ease;}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .msg.user{flex-direction:row-reverse;}

    /* Chat Avatar */
    .chat-avatar{width:38px;height:38px;border-radius:50%;object-fit:contain;border:2px solid var(--accent);flex-shrink:0;background:var(--surface);}

    .msg-user-av{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;font-size:.8rem;font-weight:700;flex-shrink:0;background:rgba(128,128,128,.15);border:1px solid var(--border);}
    .msg-body{max-width:80%;position:relative;}
    .msg-role{font-family:var(--mono);font-size:.7rem;color:var(--muted);margin-bottom:6px;}
    .msg.user .msg-role{text-align:right;}
    .msg-bubble{padding:12px 18px;border-radius:20px;font-size:.95rem;line-height:1.55;word-break:break-word;}
    .msg.user .msg-bubble{background:var(--accent);color:white;border-bottom-right-radius:4px;}
    .msg.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px;}
    .msg-bubble p{margin-bottom:8px;}
    .msg-bubble ul,.msg-bubble ol{margin:4px 0 6px 20px;}
    .msg-bubble code{background:rgba(128,128,128,.12);padding:2px 5px;border-radius:4px;font-family:monospace;font-size:.88em;}
    .msg-bubble pre{background:#0a0a0e;border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin:8px 0;font-size:.85rem;}
    .msg-bubble a{color:var(--accent);text-decoration:underline;}
    .msg-bubble strong{font-weight:700;}
    .sources-block{margin-top:8px;border-top:1px solid var(--border);padding-top:8px;font-size:.7rem;color:var(--muted);}
    .sources-block a{color:var(--accent);}

    /* Copy button */
    .copy-btn{position:absolute;top:0;right:0;background:var(--accent-lo);border:1px solid var(--accent-md);border-radius:8px;padding:4px 10px;font-size:.65rem;cursor:pointer;color:var(--accent);opacity:0;transition:opacity .2s;font-family:var(--mono);}
    .msg-body:hover .copy-btn{opacity:1;}

    /* Input area — INCREASED FONT SIZE */
    .input-area{padding:16px 28px 20px;border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);}
    .prompt-wrapper{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:60px;padding:6px 6px 6px 20px;transition:border-color .2s;}
    .prompt-wrapper:focus-within{border-color:var(--accent);}
    #messageInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:var(--ui);font-size:1rem;padding:12px 0;min-width:0;}
    #messageInput::placeholder{color:var(--muted);font-size:.95rem;}
    .send-arrow{background:var(--accent);border:none;border-radius:50%;width:42px;height:42px;display:grid;place-items:center;cursor:pointer;color:white;font-size:1.2rem;flex-shrink:0;}
    .send-arrow:disabled{opacity:.4;cursor:not-allowed;}

    /* Bottom bar — INCREASED FONT SIZE */
    .bottom-bar{display:flex;justify-content:space-between;align-items:center;margin-top:12px;padding-top:10px;border-top:1px solid var(--border);gap:20px;flex-wrap:wrap;}
    .bottom-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
    .bottom-right{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
    .status-left{font-family:var(--mono);font-size:.8rem;font-weight:600;color:var(--green);white-space:nowrap;}
    .status-left::before{content:"● ";}
    .status-left.busy{color:var(--accent);}
    .disclaimer{font-family:var(--mono);font-size:.75rem;color:var(--muted);white-space:nowrap;}
    .action-btn-sm{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-family:var(--ui);font-size:.8rem;font-weight:600;color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
    .action-btn-sm:hover{background:var(--accent-lo);border-color:var(--accent);color:var(--accent);}
    .action-btn-sm.recording{background:rgba(231,76,60,.12);border-color:var(--red);color:var(--red);}
    .stat-item{font-family:var(--mono);font-size:.8rem;font-weight:600;color:var(--muted);white-space:nowrap;}
    .stat-value{font-weight:800;color:var(--accent);}
    .upgrade-bottom-btn{background:linear-gradient(135deg,#3b82f6,#2563eb);border:none;border-radius:30px;padding:6px 18px;color:white;font-family:var(--ui);font-size:.8rem;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:all .2s;}
    .upgrade-bottom-btn:hover{transform:scale(1.02);box-shadow:0 2px 8px rgba(59,130,246,.3);}

    /* Pricing */
    .pricing-wrap{flex:1;overflow-y:auto;padding:32px 28px;min-height:0;background:var(--bg);}
    .pricing-grid{display:flex;flex-wrap:wrap;justify-content:center;gap:18px;margin-top:32px;}
    .plan-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:24px;width:210px;}
    .plan-card.highlight{border-color:var(--accent);box-shadow:0 0 20px var(--accent-lo);}
    .plan-name{font-size:1.1rem;font-weight:700;margin-bottom:8px;color:var(--text);}
    .plan-price{font-size:1.7rem;font-weight:800;color:var(--accent);}
    .plan-period{font-size:.65rem;color:var(--muted);margin-bottom:16px;}
    .plan-features{list-style:none;margin-bottom:20px;}
    .plan-features li{padding:5px 0;border-bottom:1px solid var(--border);font-size:.75rem;color:var(--text);}
    .plan-btn{background:var(--accent);border:none;border-radius:30px;padding:10px;color:white;font-weight:700;cursor:pointer;width:100%;font-family:var(--ui);font-size:.8rem;}
    .plan-btn.contact-us{background:var(--surface);color:var(--accent);border:1px solid var(--accent);}
    .plan-btn:disabled{opacity:.5;cursor:default;}

    /* Typing dots */
    @keyframes bounce{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

    /* Desktop: one line bottom bar */
    @media(min-width:901px){
      .bottom-bar{flex-wrap:nowrap;}
      .bottom-left{flex-wrap:nowrap;}
      .bottom-right{flex-wrap:nowrap;}
    }

    /* Mobile */
    @media(max-width:900px){
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        transform: translateX(-100%);
        z-index: 1000;
        width: 260px;
        box-shadow: 2px 0 10px rgba(0,0,0,0.3);
      }
      .sidebar.open {
        transform: translateX(0);
      }
      .sidebar-toggle {
        display: flex;
      }
      /* Mobile upgrade button in bottom bar only — remove from sidebar */
      .upgrade-sidebar-btn { display: none; }
      .main { width: 100%; }
      .welcome-card,.messages,.input-area{padding-left:16px;padding-right:16px;}
      .free-tier-row{flex-direction:column;align-items:flex-start;}
      .bottom-bar{flex-direction:column;align-items:stretch;}
      .bottom-left,.bottom-right{justify-content:center;}
      /* Ensure upgrade button is visible in bottom bar on mobile */
      .upgrade-bottom-btn { display: inline-flex; }
    }
    
    /* Desktop: no upgrade button in sidebar, only in bottom bar */
    @media(min-width:901px){
      .upgrade-bottom-btn { display: inline-flex; }
      .upgrade-sidebar-btn { display: none; }
      .sidebar-toggle { display: none; }
    }
  </style>
</head>
<body>

<button class="sidebar-toggle" id="sidebarToggleBtn" onclick="toggleSidebar()">☰</button>

<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">NES<span>AI</span></div>
    <div class="auth-sub">// intelligence platform v3.0</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="loginPanel" class="auth-panel active">
      <input class="auth-input" id="loginEmail" type="email" placeholder="Email address" autocomplete="email">
      <input class="auth-input" id="loginPassword" type="password" placeholder="Password" autocomplete="current-password">
      <div class="auth-err" id="loginErr"></div>
      <button class="auth-btn" onclick="doLogin()">Sign In →</button>
    </div>
    <div id="signupPanel" class="auth-panel">
      <input class="auth-input" id="signupEmail" type="email" placeholder="Email address" autocomplete="email">
      <input class="auth-input" id="signupPassword" type="password" placeholder="Password (min 6 chars)" autocomplete="new-password">
      <div class="auth-err" id="signupErr"></div>
      <button class="auth-btn" onclick="doSignup()">Create Account →</button>
    </div>
  </div>
</div>

<div id="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="https://files.catbox.moe/adhf8n.png" alt="NES AI Logo">
    </div>
    <nav class="nav">
      <div class="nav-item active" data-mode="chat"><span class="nav-icon">💬</span><span>Chat</span></div>
      <div class="nav-item" data-mode="deepcore"><span class="nav-icon">🔬</span><span>Deep Core</span></div>
      <div class="nav-item" data-mode="docs"><span class="nav-icon">📄</span><span>Documents</span></div>
      <div class="nav-item" data-mode="image"><span class="nav-icon">🎨</span><span>Image Gen</span></div>
    </nav>
    <div class="usage-wrap">
      <div class="usage-row"><span>Daily messages</span><span id="usageTxt">0 / 50</span></div>
      <div class="usage-track"><div class="usage-fill" id="usageFill"></div></div>
      <div class="user-row">
        <div class="user-av" id="userInitial">?</div>
        <div class="user-email" id="userEmail">—</div>
        <button class="logout-btn" onclick="doLogout()">✕</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌓</button>
    <div id="mainContent" style="display:flex;flex-direction:column;height:100%;overflow:hidden;"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============================================================
// NES AI — PRODUCTION CONFIGURATION
// ============================================================
const SUPABASE_URL  = 'https://sfpfjjdtczvuxyhjievt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_MH7rnJ7r8_-1TzGXcieNfA_NXoHQZbm';
const API_URL       = 'https://essential-ai-backend.onrender.com';
// ============================================================

const {createClient} = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
let session=null, mode='chat', history=[], busy=false, chatUsed=0, docsUsed=0, imagesUsed=0;
const CHAT_LIMIT = 50;
const STORAGE_KEY = 'nesai_history';

const MODE_LABELS={chat:'CHAT MODE',deepcore:'DEEP CORE MODE (1M Context)',docs:'DOCUMENTS MODE',image:'IMAGE GEN MODE'};
const LOGO_URL = 'https://files.catbox.moe/adhf8n.png';
let savedMessages = '';

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('open');
}
window.toggleSidebar = toggleSidebar;

sb.auth.onAuthStateChange((_e,s)=>{session=s; s?showApp(s.user):showAuth();});

function showApp(user){
  document.getElementById('authScreen').style.display='none';
  const app=document.getElementById('app');
  app.style.display='flex'; app.classList.add('visible');
  document.getElementById('userEmail').textContent=user.email;
  document.getElementById('userInitial').textContent=user.email[0].toUpperCase();
  loadHistoryFromStorage();
  showChatInterface();
  loadUsage();
  bindNav();
}
function showAuth(){document.getElementById('app').style.display='none';document.getElementById('authScreen').style.display='flex';}

function switchTab(tab){
  document.getElementById('tabLogin').classList.toggle('active',tab==='login');
  document.getElementById('tabSignup').classList.toggle('active',tab==='signup');
  document.getElementById('loginPanel').classList.toggle('active',tab==='login');
  document.getElementById('signupPanel').classList.toggle('active',tab==='signup');
}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPassword').value;
  const err=document.getElementById('loginErr');
  err.style.color='var(--red)'; err.textContent='';
  if(!email||!pass){err.textContent='Email and password required.';return;}
  const {error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error) err.textContent=error.message;
}
async function doSignup(){
  const email=document.getElementById('signupEmail').value.trim();
  const pass=document.getElementById('signupPassword').value;
  const err=document.getElementById('signupErr');
  err.style.color='var(--red)'; err.textContent='';
  if(!email||!pass){err.textContent='Email and password required.';return;}
  if(pass.length<6){err.textContent='Password must be at least 6 characters.';return;}
  const {error}=await sb.auth.signUp({email,password:pass});
  if(error){err.textContent=error.message;}
  else{err.style.color='var(--green)';err.textContent='✅ Account created! You can now sign in.';}
}
async function doLogout(){history=[];savedMessages='';saveHistoryToStorage();await sb.auth.signOut();location.reload();}

function toggleTheme(){
  const html=document.documentElement;
  html.setAttribute('data-theme',html.getAttribute('data-theme')==='dark'?'light':'dark');
}

function saveHistoryToStorage(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify(history.slice(-20)));}catch(e){}
}
function loadHistoryFromStorage(){
  try{
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved) history=JSON.parse(saved);
  }catch(e){history=[];}
}

function bindNav(){
  document.querySelectorAll('.nav-item').forEach(item=>{
    item.addEventListener('click',()=>{
      if(item.dataset.mode===mode)return;
      const msgs=document.getElementById('messages');
      if(msgs) savedMessages=msgs.innerHTML;
      document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
      item.classList.add('active');
      mode=item.dataset.mode;
      showChatInterface();
      if(window.innerWidth <= 900) toggleSidebar();
    });
  });
}

function showChatInterface(){
  const isSearch=(mode==='chat'||mode==='deepcore');
  document.getElementById('mainContent').innerHTML=`
    <div class="welcome-card">
      <div class="chat-mode-label" id="modePill">${MODE_LABELS[mode]}${isSearch?' 🌐 Web Search ON':''}</div>
      <div class="free-tier-row">
        <span class="free-tier">Free tier: 50 messages/day · 3 images/day · 5 document uploads/day</span>

      </div>

    <div class="messages" id="messages"></div>
    <input type="file" id="fileInput" accept=".txt,.pdf,.doc,.docx,.md,.json,.csv" style="display:none">
    <div class="input-area">
      <div class="prompt-wrapper">
        <input type="text" id="messageInput" placeholder="${mode==='image'?'Describe the image you want…':'Ask me anything...'}" maxlength="8000" autocomplete="off">
        <button class="send-arrow" id="sendBtn" onclick="sendMessage()">↑</button>
      </div>
      <div class="bottom-bar">

        </div>
        <div class="bottom-right">
          <span class="stat-item">💬 <span class="stat-value" id="statMsgs">${CHAT_LIMIT-chatUsed}</span> left</span>
          <span class="stat-item">🎨 <span class="stat-value" id="statImages">${3-imagesUsed}</span> left</span>
          <span class="stat-item">📄 <span class="stat-value" id="statDocs">${5-docsUsed}</span> left</span>
          <button class="upgrade-bottom-btn" onclick="showPricing()">✨ Upgrade →</button>
        </div>
      </div>
    </div>`;

  document.getElementById('messageInput').addEventListener('keypress',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}});
  document.getElementById('fileInput').addEventListener('change',handleFileUpload);

  const msgsEl = document.getElementById('messages');
  if(savedMessages) {
    msgsEl.innerHTML = savedMessages;
  } else if(history.length===0) {

  } else {
    history.forEach(h=>{
      if(h.role==='user') appendMsg('<div class="msg user"><div class="msg-user-av">U</div><div class="msg-body"><div class="msg-role">You</div><div class="msg-bubble">'+esc(h.content)+'</div></div></div>');
      else appendMsg('<div class="msg ai"><img src="'+LOGO_URL+'" class="chat-avatar"><div class="msg-body"><div class="msg-role">NES AI</div><div class="msg-bubble">'+md(h.content)+'</div><button class="copy-btn" onclick="copyMsg(this)">📋 Copy</button></div></div>');
    });
  }
  scrollDown();
}

function handleAttach(){
  if(mode!=='docs'){
    addAiMsg('📎 File attachment works in **Documents mode**. Please switch to 📄 Documents in the sidebar.');
    return;
  }
  document.getElementById('fileInput')?.click();
}

async function handleFileUpload(e){
  const file=e.target.files[0]; if(!file)return;
  e.target.value='';
  if(file.size>10*1024*1024){addAiMsg('❌ File too large. Max 10MB.');return;}

  const name=file.name.toLowerCase();
  addUserMsg('📎 '+file.name+' ('+Math.round(file.size/1024)+' KB) — analyzing…');
  setBusy(true); addTyping();

  try{
    let content='';
    if(name.endsWith('.docx')){
      if(typeof mammoth === 'undefined'){
        await loadScript('https://cdn.jsdelivr.net/npm/mammoth@1.6.0/mammoth.browser.min.js');
      }
      const arrayBuffer = await file.arrayBuffer();
      const result = await mammoth.extractRawText({arrayBuffer});
      content = result.value;
      if(!content.trim()){addAiMsg('❌ Could not extract text from this .docx file.');setBusy(false);removeTyping();return;}
    }
    else if(name.endsWith('.pdf')){
      if(typeof pdfjsLib === 'undefined'){
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
      const pages=[];
      for(let i=1;i<=Math.min(pdf.numPages,20);i++){
        const page=await pdf.getPage(i);
        const tc=await page.getTextContent();
        pages.push(tc.items.map(s=>s.str).join(' '));
      }
      content=pages.join('\n');
      if(!content.trim()){addAiMsg('❌ This PDF appears to be image-based (scanned).');setBusy(false);removeTyping();return;}
    }
    else{
      content = await file.text();
    }

    content = content.substring(0, 6000);
    history.push({role:'user',content:'Please analyze this document: '+file.name+'\n\nContent:\n'+content});
    saveHistoryToStorage();

    const res=await fetch(API_URL+'/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body:JSON.stringify({message:'Please analyze this document called "'+file.name+'" and provide a clear summary.\n\nDocument content:\n'+content,mode:'docs',webSearch:false,history:history.slice(-6)})
    });
    removeTyping();
    if(res.ok){
      const data=await res.json();
      history.push({role:'assistant',content:data.reply});
      saveHistoryToStorage();
      addAiMsg(data.reply);
      docsUsed++;
      const statDocs=document.getElementById('statDocs');
      if(statDocs) statDocs.textContent=Math.max(0,5-docsUsed);
      const msgs=document.getElementById('messages');
      if(msgs) savedMessages=msgs.innerHTML;
      loadUsage();
    }else{
      addAiMsg('❌ Could not analyze file');
    }
  }catch(err){
    removeTyping();
    addAiMsg('❌ Error reading file: '+err.message);
  }
  setBusy(false);
}

function loadScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src=src; s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}

function toggleVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addAiMsg('❌ Voice not supported in this browser. Try Chrome.');return;}
  const btn=document.getElementById('voiceBtn');
  const recognition=new SR();
  recognition.lang='en-US'; recognition.interimResults=false;
  btn?.classList.add('recording');
  setStatus('busy','Listening…');
  recognition.onresult=e=>{
    const t=e.results[0][0].transcript;
    const input=document.getElementById('messageInput');
    if(input){input.value=t;}
    btn?.classList.remove('recording');
    setStatus('ok','Ready');
    sendMessage();
  };
  recognition.onerror=recognition.onend=()=>{btn?.classList.remove('recording');setStatus('ok','Ready');};
  recognition.start();
}

async function sendMessage(){
  if(busy||!session)return;
  const input=document.getElementById('messageInput');
  const text=input.value.trim(); if(!text)return;
  input.value='';
  setBusy(true); addUserMsg(text);
  history.push({role:'user',content:text});
  saveHistoryToStorage();
  addTyping();
  try{
    const endpoint=mode==='image'?'/api/image':'/api/chat';
    const useSearch=(mode==='chat'||mode==='deepcore');
    const body=mode==='image'?{prompt:text}:{message:text,mode,webSearch:useSearch,history:history.slice(-10)};
    const res=await fetch(API_URL+endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+session.access_token},
      body:JSON.stringify(body)
    });
    removeTyping();
    if(!res.ok){const e=await res.json().catch(()=>({}));addAiMsg('❌ Error: '+(e.error||res.status));setBusy(false);return;}
    const data=await res.json();
    if(mode==='image'){
      addImageMsg(data.url,data.revisedPrompt||text);
      imagesUsed++;
      const statImages=document.getElementById('statImages');
      if(statImages) statImages.textContent=Math.max(0,3-imagesUsed);
    }
    else{
      history.push({role:'assistant',content:data.reply});
      saveHistoryToStorage();
      addAiMsg(data.reply,data.sources||[]);
    }
    const msgs=document.getElementById('messages');
    if(msgs) savedMessages=msgs.innerHTML;
    loadUsage();
  }catch(e){removeTyping();addAiMsg('❌ Network error — check your connection.');}
  setBusy(false);
}

async function loadUsage(){
  if(!session)return;
  try{
    const res=await fetch(API_URL+'/api/usage',{headers:{'Authorization':'Bearer '+session.access_token}});
    if(res.ok){
      const d=await res.json();
      chatUsed=d.chats||0;
      const txt=document.getElementById('usageTxt');
      const fill=document.getElementById('usageFill');
      const stat=document.getElementById('statMsgs');
      if(txt) txt.textContent=chatUsed+' / 50';
      if(fill) fill.style.width=Math.min(100,(chatUsed/50)*100)+'%';
      if(stat) stat.textContent=CHAT_LIMIT-chatUsed;
    }
  }catch(e){}
}

function copyMsg(btn){
  const bubble=btn.closest('.msg-body').querySelector('.msg-bubble');
  navigator.clipboard.writeText(bubble.innerText||'');
  btn.textContent='✓ Copied!';
  setTimeout(()=>btn.textContent='📋 Copy',2000);
}

function addUserMsg(text){appendMsg('<div class="msg user"><div class="msg-user-av">U</div><div class="msg-body"><div class="msg-role">You</div><div class="msg-bubble">'+esc(text)+'</div></div></div>');}

function addAiMsg(text,sources=[]){
  const src=sources.length?'<div class="sources-block">📚 Sources: '+sources.map((s,i)=>'<a href="'+esc(s.url)+'" target="_blank">'+(i+1)+'. '+esc(s.title||s.url)+'</a>').join(' · ')+'</div>':'';
  appendMsg('<div class="msg ai"><img src="'+LOGO_URL+'" class="chat-avatar"><div class="msg-body"><div class="msg-role">NES AI</div><div class="msg-bubble">'+md(text)+src+'</div><button class="copy-btn" onclick="copyMsg(this)">📋 Copy</button></div></div>');
}

function addImageMsg(url,prompt){appendMsg('<div class="msg ai"><img src="'+LOGO_URL+'" class="chat-avatar"><div class="msg-body"><div class="msg-role">NES AI · DALL-E 3</div><div class="msg-bubble"><img src="'+esc(url)+'" style="max-width:100%;border-radius:10px;margin-top:6px;"><div style="font-size:.65rem;color:var(--muted);margin-top:6px;">Prompt: '+esc(prompt)+'</div></div></div></div>');}

function addTyping(){
  const el=document.createElement('div'); el.className='msg ai'; el.id='typing';
  el.innerHTML='<img src="'+LOGO_URL+'" class="chat-avatar"><div class="msg-body"><div class="msg-role">NES AI</div><div class="msg-bubble"><div style="display:flex;gap:5px;padding:4px 0;"><div style="width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.4s infinite;opacity:.4;"></div><div style="width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.4s .2s infinite;opacity:.4;"></div><div style="width:7px;height:7px;background:var(--accent);border-radius:50%;animation:bounce 1.4s .4s infinite;opacity:.4;"></div></div></div></div>';
  document.getElementById('messages')?.appendChild(el); scrollDown();
}
function removeTyping(){document.getElementById('typing')?.remove();}
function appendMsg(html){document.getElementById('messages')?.insertAdjacentHTML('beforeend',html);scrollDown();}
function scrollDown(){const c=document.getElementById('messages');if(c)c.scrollTop=c.scrollHeight;}
function setBusy(b){busy=b;const btn=document.getElementById('sendBtn');if(btn)btn.disabled=b;setStatus(b?'busy':'ok',b?'Thinking…':'Ready');}
function setStatus(cls,txt){const el=document.getElementById('statusEl');if(el){el.className='status-left '+(cls==='busy'?'busy':'');el.textContent=txt;}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function md(s){
  let m=esc(s);
  m=m.replace(/```(\w*)\n?([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  m=m.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  m=m.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  m=m.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  m=m.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  m=m.replace(/^# (.+)$/gm,'<h1>$1</h1>');
  m=m.replace(/^\* (.+)$/gm,'<li>$1</li>');
  m=m.replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>');
  m=m.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  m=m.replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>');
  return '<p>'+m+'</p>'.replace(/<p>\s*<\/p>/g,'');
}

window.switchTab=switchTab; window.doLogin=doLogin; window.doSignup=doSignup; window.doLogout=doLogout;
window.toggleTheme=toggleTheme; window.showPricing=showPricing; window.showChatInterface=showChatInterface;
