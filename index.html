<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Essential AI v3.0 — Intelligence Platform</title>
  <meta name="description" content="Essential AI — intelligent workspace with 1M context, web search, DALL-E 3, and daily free tier.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0c;
      --surface: #111115;
      --border: #1e1e24;
      --text: #e8e8ec;
      --muted: #6b6b7e;
      --accent: #FF5722;
      --accent-lo: rgba(255, 87, 34, 0.12);
      --accent-md: rgba(255, 87, 34, 0.25);
      --green: #2ecc71;
      --red: #e74c3c;
      --blue: #3b82f6;
      --ui: 'Syne', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    [data-theme="light"] {
      --bg: #f0f0ea;
      --surface: #ffffff;
      --border: #dddde3;
      --text: #1a1a2e;
      --muted: #8a8a9e;
    }

    body {
      font-family: var(--ui);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ========== AUTH SCREEN ========== */
    #authScreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .auth-box {
      width: min(400px, 90vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 40px;
    }
    .auth-logo {
      font-size: 1.6rem;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .auth-logo span { color: var(--accent); }
    .auth-sub {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .auth-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .auth-tab {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--ui);
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
    }
    .auth-tab.active {
      color: var(--accent);
      border-bottom: 2px solid var(--accent);
    }
    .auth-panel {
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .auth-panel.active { display: flex; }
    .auth-input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.85rem;
      outline: none;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 12px;
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    .auth-btn:hover { opacity: 0.88; }
    .auth-err {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--red);
      min-height: 18px;
    }

    /* ========== LEFT SIDEBAR ========== */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 24px 16px;
    }

    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      padding: 0 8px;
      margin-bottom: 4px;
    }
    .logo span { color: var(--accent); }
    .logo-version {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      padding: 0 8px;
      margin-bottom: 24px;
    }

    .upgrade-btn {
      background: linear-gradient(135deg, #FF5722, #FF3D00);
      border: none;
      border-radius: 40px;
      padding: 10px 16px;
      color: white;
      font-family: var(--ui);
      font-size: 0.75rem;
      font-weight: 700;
      cursor: pointer;
      margin: 0 8px 20px 8px;
      text-align: center;
      box-shadow: 0 2px 8px rgba(255, 87, 34, 0.3);
    }
    .upgrade-btn:hover {
      opacity: 0.9;
      transform: scale(1.02);
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.15s;
    }
    .nav-item:hover {
      background: var(--accent-lo);
      color: var(--accent);
    }
    .nav-item.active {
      background: var(--accent-lo);
      color: var(--accent);
    }
    .nav-icon {
      font-size: 1.1rem;
      width: 24px;
    }

    .usage-wrap {
      margin-top: auto;
      padding: 16px 8px 0;
      border-top: 1px solid var(--border);
    }
    .usage-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .usage-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .usage-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
    }

    .user-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-top: 12px;
    }
    .user-av {
      width: 32px;
      height: 32px;
      background: var(--accent-lo);
      border: 1px solid var(--accent-md);
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      color: var(--accent);
      font-weight: 700;
    }
    .user-email {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .logout-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
    }
    .logout-btn:hover { color: var(--red); }

    /* ========== MAIN CHAT AREA ========== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      max-width: calc(100% - 260px);
      position: relative;
    }

    /* Dark/Light Mode Toggle */
    .theme-toggle {
      position: absolute;
      top: 16px;
      right: 20px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      z-index: 10;
    }
    .theme-toggle:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .chat-header {
      padding: 20px 28px 8px 28px;
      border-bottom: 1px solid var(--border);
    }
    .chat-mode {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .websearch-badge {
      font-size: 0.6rem;
      color: var(--accent);
      margin-left: 8px;
    }

    .welcome-card {
      padding: 16px 28px 20px 28px;
      border-bottom: 1px solid var(--border);
    }
    .welcome-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .welcome-title span { color: var(--accent); }
    .welcome-sub-bold {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 16px;
    }
    .features-bold {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 16px;
      font-weight: 700;
      color: var(--accent);
    }
    .feature-bold-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      font-family: var(--mono);
      font-weight: 700;
      color: var(--accent);
    }
    .free-tier {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    /* EAI Avatar - Black background, orange border, E inside @, i separate */
    .eai-avatar {
      width: 32px;
      height: 32px;
      background: #000000;
      border: 2px solid var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--ui);
      font-weight: 800;
      flex-shrink: 0;
    }
    .eai-text {
      font-size: 0.9rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .at-symbol {
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
      position: relative;
      display: inline-block;
    }
    .e-inside {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 0.58rem;
      font-weight: 900;
      color: #FFFFFF;
      text-transform: lowercase;
    }
    .i-separate {
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--accent);
      margin-left: -3px;
      text-transform: lowercase;
    }

    .msg.user .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
      background: rgba(128, 128, 128, 0.15);
      border: 1px solid var(--border);
    }

    .msg-body {
      max-width: 80%;
      position: relative;
    }
    .msg-role {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .msg.user .msg-role { text-align: right; }
    .msg-bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.85rem;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.user .msg-bubble {
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }
    .msg.ai .msg-bubble {
      background: var(--bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }
    .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 {
      margin: 8px 0 4px;
      font-weight: 700;
      font-size: 0.95rem;
    }
    .msg-bubble p { margin-bottom: 8px; }
    .msg-bubble ul, .msg-bubble ol { margin: 6px 0 8px 20px; }
    .msg-bubble code {
      background: rgba(128, 128, 128, 0.12);
      padding: 2px 5px;
      border-radius: 4px;
      font-family: monospace;
    }
    .copy-btn {
      position: absolute;
      top: 0;
      right: 0;
      background: var(--accent-lo);
      border: 1px solid var(--accent-md);
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 0.6rem;
      cursor: pointer;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .msg-body:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { background: var(--accent-md); }

    #fileInput { display: none; }

    .input-area {
      padding: 16px 28px 24px 28px;
      border-top: 1px solid var(--border);
    }
    .prompt-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 60px;
      padding: 6px 6px 6px 20px;
    }
    .prompt-wrapper:focus-within { border-color: var(--accent); }
    #messageInput {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--ui);
      font-size: 0.85rem;
      padding: 12px 0;
    }
    #messageInput::placeholder { color: var(--muted); }
    .send-arrow {
      background: var(--accent);
      border: none;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      cursor: pointer;
      color: white;
      font-size: 1.1rem;
    }

    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 16px;
    }
    .action-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 8px 32px;
      font-family: var(--ui);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .action-btn:hover {
      background: var(--accent-lo);
      border-color: var(--accent);
      color: var(--accent);
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
    }
    .status-left {
      color: var(--green);
    }
    .status-left::before { content: "● "; }
    .status-stats { display: flex; gap: 16px; }
    .upgrade-link {
      color: var(--accent);
      text-decoration: none;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    @media (max-width: 700px) {
      .sidebar { width: 70px; padding: 16px 8px; }
      .logo, .logo-version, .upgrade-btn, .nav-item span:not(.nav-icon), .usage-wrap, .user-email { display: none; }
      .nav-item { justify-content: center; padding: 12px 0; }
      .user-row { justify-content: center; }
      .main { max-width: calc(100% - 70px); }
      .chat-header, .welcome-card, .messages, .input-area { padding-left: 16px; padding-right: 16px; }
      .status-stats { gap: 8px; font-size: 0.55rem; }
      .action-btn { padding: 6px 16px; font-size: 0.65rem; }
      .feature-bold-item { font-size: 0.6rem; }
    }
  </style>
</head>
<body>

<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Essential<span>AI</span></div>
    <div class="auth-sub">// intelligence platform</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Sign In</button>
      <button class="auth-tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>
    <div id="loginPanel" class="auth-panel active">
      <input class="auth-input" id="loginEmail" type="email" placeholder="Email address">
      <input class="auth-input" id="loginPassword" type="password" placeholder="Password">
      <div class="auth-err" id="loginErr"></div>
      <button class="auth-btn" onclick="doLogin()">Sign In →</button>
    </div>
    <div id="signupPanel" class="auth-panel">
      <input class="auth-input" id="signupEmail" type="email" placeholder="Email address">
      <input class="auth-input" id="signupPassword" type="password" placeholder="Password (min 6 chars)">
      <div class="auth-err" id="signupErr"></div>
      <button class="auth-btn" onclick="doSignup()">Create Account →</button>
    </div>
  </div>
</div>

<div id="app" style="display:none; width:100%;">
  <aside class="sidebar">
    <div class="logo">Essential<span>AI</span></div>
    <div class="logo-version">v3.0</div>
    <button class="upgrade-btn" id="upgradeBtn">✨ Upgrade to Pro</button>
    <nav class="nav">
      <div class="nav-item active" data-mode="chat"><span class="nav-icon">💬</span><span>Chat</span></div>
      <div class="nav-item" data-mode="deepcore"><span class="nav-icon">🔬</span><span>Deep Core</span></div>
      <div class="nav-item" data-mode="docs"><span class="nav-icon">📄</span><span>Documents</span></div>
      <div class="nav-item" data-mode="image"><span class="nav-icon">🎨</span><span>Image Gen</span></div>
    </nav>
    <div class="usage-wrap">
      <div class="usage-row"><span>Daily messages</span><span id="usageTxt">0 / 50</span></div>
      <div class="usage-track"><div class="usage-fill" id="usageFill" style="width:0%"></div></div>
      <div class="user-row">
        <div class="user-av" id="userInitial">?</div>
        <div class="user-email" id="userEmail">—</div>
        <button class="logout-btn" id="logoutBtn">✕</button>
      </div>
    </div>
  </aside>

  <main class="main">
    <button class="theme-toggle" id="themeToggle" title="Toggle theme">🌓</button>
    <div id="mainContent"></div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ============================================================
// 🔧 PASTE YOUR SUPABASE PUBLISHABLE KEY BELOW
// ============================================================
const SUPABASE_URL  = 'https://sfpfjjdtczvuxyhjievt.supabase.co';
const SUPABASE_ANON = 'sb_publishable_MH7rnJ7r8_-1TzGXcieNfA_NXoHQZbm';
const API_URL       = 'https://essential-ai-backend.onrender.com';
// ============================================================

const {createClient} = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);
let session = null, mode = 'chat', history = [], busy = false;
let webSearch = true; // ALWAYS ON for chat and deepcore

const MODE_LABELS = {
  chat: 'CHAT MODE',
  deepcore: 'DEEP CORE MODE',
  docs: 'DOCUMENTS MODE',
  image: 'IMAGE GEN MODE'
};

// EAI Avatar HTML
const EAI_AVATAR = `<div class="eai-avatar"><div class="eai-text"><span class="at-symbol">@<span class="e-inside">e</span></span><span class="i-separate">i</span></div></div>`;

sb.auth.onAuthStateChange((_e, s) => { session = s; s ? showApp(s.user) : showAuth(); });

function showApp(user) {
  document.getElementById('authScreen').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  document.getElementById('userEmail').textContent = user.email;
  document.getElementById('userInitial').textContent = user.email[0].toUpperCase();
  showChatInterface();
  loadUsage();
  bindNav();
}

function showAuth() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('authScreen').style.display = 'flex';
}

function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabSignup').classList.toggle('active', tab === 'signup');
  document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
  document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginErr');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Email and password required.'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) err.textContent = error.message;
}

async function doSignup() {
  const email = document.getElementById('signupEmail').value.trim();
  const pass = document.getElementById('signupPassword').value;
  const err = document.getElementById('signupErr');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'Email and password required.'; return; }
  if (pass.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return; }
  const { error } = await sb.auth.signUp({ email, password: pass });
  if (error) { err.textContent = error.message; }
  else { err.style.color = 'var(--green)'; err.textContent = '✅ Account created! You can now sign in.'; }
}

async function doLogout() { await sb.auth.signOut(); }

function bindNav() {
  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      mode = item.dataset.mode;
      updateModeUI();
      showChatInterface();
      addAiMsg(`Switched to <strong>${MODE_LABELS[mode]}</strong>. Web search is ${(mode === 'chat' || mode === 'deepcore') ? 'ON' : 'OFF'}.`);
    });
  });
}

function updateModeUI() {
  const pill = document.getElementById('modePill');
  if (pill) pill.textContent = MODE_LABELS[mode];
  const input = document.getElementById('messageInput');
  if (input) input.placeholder = mode === 'image' ? 'Describe the image you want…' : 'Ask me anything...';
}

function showChatInterface() {
  const isSearchMode = (mode === 'chat' || mode === 'deepcore');
  const webSearchBadge = isSearchMode ? '<span class="websearch-badge">🌐 Web Search ON</span>' : '';
  
  document.getElementById('mainContent').innerHTML = `
    <div style="display:flex; flex-direction:column; height:100%; overflow:hidden;">
      <div class="chat-header">
        <div class="chat-mode" id="modePill">${MODE_LABELS[mode]}${webSearchBadge}</div>
      </div>
      <div class="welcome-card">
        <div class="welcome-title">Welcome to Essential<span>AI</span> v3.0</div>
        <div class="welcome-sub-bold">Your complete AI workspace with intelligent routing:</div>
        <div class="features-bold">
          <div class="feature-bold-item"><span>💬</span> Intelligent Chat</div>

function attachEventListeners() {
  const msgInput = document.getElementById('messageInput');
  const sendBtn = document.getElementById('sendBtn');
  const attachBtn = document.getElementById('attachBtn');
  const voiceBtn = document.getElementById('voiceBtn');
  const fileInput = document.getElementById('fileInput');
  const upgradeLink = document.getElementById('upgradeLink');
  const upgradeBtn = document.getElementById('upgradeBtn');
  
  if (msgInput) {
    msgInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
  }
  if (sendBtn) sendBtn.addEventListener('click', sendMessage);
  if (attachBtn) attachBtn.addEventListener('click', () => triggerAttach(fileInput));
  if (voiceBtn) voiceBtn.addEventListener('click', toggleVoice);
  if (upgradeLink) upgradeLink.addEventListener('click', (e) => { e.preventDefault(); showPricing(); });
  if (upgradeBtn) upgradeBtn.addEventListener('click', showPricing);
  if (fileInput) fileInput.addEventListener('change', (e) => handleFileUpload(e, fileInput));
}

function triggerAttach(fileInput) {
  if (mode !== 'docs') {
    addAiMsg('📎 File attachment is only available in <strong>Documents mode</strong>. Please switch to Documents mode first.');
    return;
  }
  fileInput.click();
}

function handleFileUpload(e, fileInput) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    addAiMsg('❌ File too large. Max size is 5MB.');
    fileInput.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev) => {
    const content = ev.target.result;
    addUserMsg(`📎 Attached: ${file.name}\n\n${content.substring(0, 2000)}${content.length > 2000 ? '...' : ''}`);
    sendMessageWithFile(content, file.name);
  };
  reader.readAsText(file);
}

async function sendMessageWithFile(content, filename) {
  if (busy || !session) return;
  setBusy(true);
  addTyping();
  try {
    const res = await fetch(API_URL + '/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
      body: JSON.stringify({
        message: `Please analyze this file: ${filename}\n\nContent:\n${content.substring(0, 3000)}`,
        mode: 'docs',
        webSearch: false,
        history: history.slice(-10)
      })
    });
    removeTyping();
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      addAiMsg('❌ Error: ' + (e.error || res.status));
      setBusy(false);
      return;
    }
    const data = await res.json();
    history.push({ role: 'assistant', content: data.reply });
    addAiMsg(data.reply, data.sources || []);
    loadUsage();
  } catch (e) {
    removeTyping();
    addAiMsg('❌ Network error — check your connection.');
  }
  setBusy(false);
}

function toggleVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { addAiMsg('❌ Voice input not supported in this browser.'); return; }
  const recognition = new SR();
  recognition.lang = 'en-US';
  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    const input = document.getElementById('messageInput');
    if (input) input.value = text;
    sendMessage();
  };
  recognition.start();
}

async function sendMessage() {
  if (busy || !session) return;
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  setBusy(true);
  addUserMsg(text);
  history.push({ role: 'user', content: text });
  addTyping();
  try {
    const endpoint = mode === 'image' ? '/api/image' : '/api/chat';
    const useWebSearch = (mode === 'chat' || mode === 'deepcore');
    const body = mode === 'image' 
      ? { prompt: text } 
      : { message: text, mode, webSearch: useWebSearch, history: history.slice(-10) };
    
    const res = await fetch(API_URL + endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
      body: JSON.stringify(body)
    });
    removeTyping();
    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      addAiMsg('❌ Error: ' + (e.error || e.message || res.status));
      setBusy(false);
      return;
    }
    const data = await res.json();
    if (mode === 'image') {
      addImageMsg(data.url, data.revisedPrompt || text);
    } else {
      history.push({ role: 'assistant', content: data.reply });
      addAiMsg(data.reply, data.sources || []);
    }
    loadUsage();
  } catch (e) {
    removeTyping();
    console.error(e);
    addAiMsg('❌ Network error — check your connection.');
  }
  setBusy(false);
}

async function loadUsage() {
  if (!session) return;
  try {
    const res = await fetch(API_URL + '/api/usage', { headers: { 'Authorization': 'Bearer ' + session.access_token } });
    if (res.ok) {
      const d = await res.json();
      const used = d.chats || 0;
      const txt = document.getElementById('usageTxt');
      const fill = document.getElementById('usageFill');
      const statMsgs = document.getElementById('statMsgs');
      if (txt) txt.textContent = used + ' / 50';
      if (fill) fill.style.width = Math.min(100, (used / 50) * 100) + '%';
      if (statMsgs) statMsgs.textContent = 50 - used;
    }
  } catch (e) { }
}

function addUserMsg(text) {
  appendMsg('<div class="msg user"><div class="msg-avatar">U</div><div class="msg-body"><div class="msg-role">You</div><div class="msg-bubble">' + esc(text) + '</div></div></div>');
}

function addAiMsg(text, sources = []) {
  const src = sources.length ? '<div class="sources-block" style="margin-top:10px; border-top:1px solid var(--border); padding-top:8px; font-size:0.65rem;"><strong>Sources:</strong> ' + sources.map((s, i) => '<a href="' + esc(s.url) + '" target="_blank" style="color:var(--blue);">' + (i+1) + '</a>').join(', ') + '</div>' : '';
  appendMsg('<div class="msg ai">' + EAI_AVATAR + '<div class="msg-body"><div class="msg-role">Essential AI</div><div class="msg-bubble">' + cleanMarkdown(text) + src + '</div></div></div>');
  addCopyButtonsToMessages();
}

function addImageMsg(url, prompt) {
  appendMsg('<div class="msg ai">' + EAI_AVATAR + '<div class="msg-body"><div class="msg-role">Essential AI · DALL-E 3</div><div class="msg-bubble"><img src="' + esc(url) + '" style="max-width:100%; border-radius:10px; margin-top:8px;"><div style="font-size:0.7rem; color:var(--muted); margin-top:6px;">Prompt: ' + esc(prompt) + '</div></div></div></div>');
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg ai';
  el.id = 'typing';
  el.innerHTML = EAI_AVATAR + '<div class="msg-body"><div class="msg-role">Essential AI</div><div class="msg-bubble"><div style="display:flex; gap:5px; padding:6px 2px;"><div style="width:7px; height:7px; background:var(--accent); border-radius:50%; animation:bounce 1.4s infinite;"></div><div style="width:7px; height:7px; background:var(--accent); border-radius:50%; animation:bounce 1.4s infinite 0.2s;"></div><div style="width:7px; height:7px; background:var(--accent); border-radius:50%; animation:bounce 1.4s infinite 0.4s;"></div></div></div></div>';
  document.getElementById('messages')?.appendChild(el);
  scrollDown();
}

function removeTyping() { document.getElementById('typing')?.remove(); }
function appendMsg(html) { document.getElementById('messages')?.insertAdjacentHTML('beforeend', html); scrollDown(); }
function scrollDown() { const c = document.getElementById('messages'); if (c) c.scrollTop = c.scrollHeight; }
function setBusy(b) { busy = b; const btn = document.getElementById('sendBtn'); if (btn) btn.disabled = b; setStatus(b ? 'busy' : 'ok', b ? 'Thinking…' : 'Ready'); }
function setStatus(cls, txt) { const el = document.getElementById('statusEl'); if (el) { el.className = 'status-left ' + cls; el.textContent = txt; } }
function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
function cleanMarkdown(s) {
  let m = s;
  m = m.replace(/^### (.*?)$/gm, '<strong>$1</strong>');
  m = m.replace(/^## (.*?)$/gm, '<strong>$1</strong>');
  m = m.replace(/^# (.*?)$/gm, '<strong>$1</strong>');
  m = m.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  m = m.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  m = m.replace(/^\* (.+)$/gm, '<li>$1</li>');
  m = m.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
  m = m.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--blue);">$1</a>');
  m = m.replace(/\n\n/g, '</p><p>').replace(/\n/g, '<br>');
  return '<p>' + m + '</p>'.replace(/<p>\s*<\/p>/g, '');
}

function addCopyButtonsToMessages() {
  document.querySelectorAll('.msg.ai .msg-body').forEach(body => {
    if (!body.querySelector('.copy-btn')) {
      const bubble = body.querySelector('.msg-bubble');
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.innerHTML = '📋 Copy';
      btn.onclick = () => {
        const text = bubble.innerText;
        navigator.clipboard.writeText(text);
        btn.innerHTML = '✓ Copied!';
        setTimeout(() => btn.innerHTML = '📋 Copy', 2000);
      };
      body.appendChild(btn);
    }
  });
}
